<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="catGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="112" fill="url(#bgGradient)"/>
  
  <!-- 小猫身体 -->
  <g filter="url(#shadow)">
    <!-- 头部 -->
    <ellipse cx="256" cy="270" rx="130" ry="120" fill="url(#catGradient)" stroke="#f59e0b" stroke-width="3"/>
    
    <!-- 左耳 -->
    <path d="M 160 190 L 130 120 L 210 170 Z" fill="url(#catGradient)" stroke="#f59e0b" stroke-width="3"/>
    <!-- 右耳 -->
    <path d="M 352 190 L 382 120 L 302 170 Z" fill="url(#catGradient)" stroke="#f59e0b" stroke-width="3"/>
    
    <!-- 左耳内部 -->
    <path d="M 165 180 L 150 140 L 195 165 Z" fill="#fbbf24" opacity="0.6"/>
    <!-- 右耳内部 -->
    <path d="M 347 180 L 362 140 L 317 165 Z" fill="#fbbf24" opacity="0.6"/>
    
    <!-- 眼睛 -->
    <ellipse cx="210" cy="260" rx="18" ry="22" fill="#1f2937"/>
    <ellipse cx="302" cy="260" rx="18" ry="22" fill="#1f2937"/>
    
    <!-- 眼睛高光 -->
    <circle cx="216" cy="254" r="6" fill="#ffffff"/>
    <circle cx="308" cy="254" r="6" fill="#ffffff"/>
    <circle cx="206" cy="266" r="3" fill="#ffffff"/>
    <circle cx="298" cy="266" r="3" fill="#ffffff"/>
    
    <!-- 鼻子 -->
    <path d="M 248 295 Q 256 305 264 295 Q 256 310 248 295" fill="#ec4899"/>
    
    <!-- 嘴巴 -->
    <path d="M 256 305 Q 256 320 240 320" stroke="#1f2937" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 256 305 Q 256 320 272 320" stroke="#1f2937" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- 胡须 -->
    <line x1="180" y1="290" x2="130" y2="285" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
    <line x1="180" y1="300" x2="125" y2="305" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
    <line x1="332" y1="290" x2="382" y2="285" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
    <line x1="332" y1="300" x2="387" y2="305" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 腮红 -->
    <ellipse cx="180" cy="300" rx="20" ry="12" fill="#fb7185" opacity="0.4"/>
    <ellipse cx="332" cy="300" rx="20" ry="12" fill="#fb7185" opacity="0.4"/>
  </g>
  
  <!-- 小爪子在底部 -->
  <g filter="url(#shadow)">
    <ellipse cx="220" cy="420" rx="35" ry="20" fill="url(#catGradient)" stroke="#f59e0b" stroke-width="2"/>
    <ellipse cx="292" cy="420" rx="35" ry="20" fill="url(#catGradient)" stroke="#f59e0b" stroke-width="2"/>
  </g>
</svg>
